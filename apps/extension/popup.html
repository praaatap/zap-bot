<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Zap Bot Copilot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>Zap Bot Copilot</h1>
    <p id="status">Open Meet/Zoom/Teams tab with captions enabled.</p>

    <label for="apiUrl">API URL</label>
    <input id="apiUrl" placeholder="http://localhost:3001" />

    <label for="meetingId">Meeting ID</label>
    <input id="meetingId" placeholder="mtg-001" />

    <label for="prompt">What help do you need?</label>
    <textarea id="prompt" rows="3" placeholder="How do I respond about timeline risk?"></textarea>

    <button id="suggestBtn">Get Suggestion</button>
    <pre id="output"></pre>
  </main>
  <script src="popup.js"></script>
</body>
</html>
